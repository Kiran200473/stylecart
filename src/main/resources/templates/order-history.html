<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Order History - Style Cart</title>

<link rel="icon" type="image/png" href="/images/Logo.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f8f9fa;
}

.navbar{
    background:#111827;
}

.order-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    transition:.3s;
}

.order-card:hover{
    transform:translateY(-5px);
}

.product-image{
    height:250px;
    object-fit:cover;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

    <a class="navbar-brand fw-bold"
       href="/home">
        Style Cart
    </a>

</div>

</nav>

<div class="container mt-5">

<h1 class="text-center fw-bold mb-4">
    Order History
</h1>

<div class="text-center mb-4">

    <a href="/products"
       class="btn btn-dark">
        ← Back To Products
    </a>

</div>

<div class="row">

    <div class="col-md-4 mb-4"
         th:each="order : ${orders}">

        <div class="card shadow order-card">

            <img th:src="${order.imageUrl}"
                 class="card-img-top product-image">

            <div class="card-body text-center">

                <h5 th:text="${order.productName}">
                    Product
                </h5>

                <h4 class="text-success">

                    ₹<span th:text="${order.price}"></span>

                </h4>

                <p>

                    Quantity:
                    <span th:text="${order.quantity}"></span>

                </p>

            </div>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {

    navigator.serviceWorker
        .register('/sw.js')
        .then(() => {
            console.log('Service Worker Registered');
        });

}
</script>

</body>
</html>

</body>

</html>
