<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Login - Style Cart</title>

<link rel="icon" type="image/png" href="/images/Logo.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        min-height:100vh;
        background:#f8f9fa;
    }

    .login-container{
        min-height:100vh;
    }

    .left-side{
        background:
        linear-gradient(rgba(0,0,0,.45),
        rgba(0,0,0,.45)),
        url('https://images.unsplash.com/photo-1441986300917-64674bd600d8');
        background-size:cover;
        background-position:center;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:50px;
    }

    .brand-content h1{
        font-size:60px;
        font-weight:bold;
    }

    .brand-content p{
        font-size:20px;
        margin-top:15px;
    }

    .right-side{
        display:flex;
        justify-content:center;
        align-items:center;
        padding:40px;
        background:white;
    }

    .login-card{
        width:100%;
        max-width:450px;
    }

    .logo-circle{
        width:80px;
        height:80px;
        border-radius:50%;
        background:#111827;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:35px;
        margin:auto;
    }

    .form-control{
        height:50px;
        border-radius:12px;
    }

    .btn-login{
        height:50px;
        border-radius:12px;
        background:#111827;
        color:white;
        font-weight:600;
    }

    .btn-login:hover{
        background:#000;
        color:white;
    }

    .social-btn{
        border-radius:12px;
    }

    @media(max-width:768px){

        .left-side{
            display:none;
        }

    }

</style>

</head>

<body>

<div class="container-fluid">

<div class="row login-container">

    <div class="col-md-6 left-side">

        <div class="brand-content text-center">

            <h1>STYLE CART</h1>

            <p>
                Premium Fashion • Electronics • Lifestyle
            </p>

            <h4 class="mt-4">
                Discover Trending Products
            </h4>

        </div>

    </div>

    <div class="col-md-6 right-side">

        <div class="login-card">

            <div class="logo-circle mb-4">
                <i class="fas fa-cart-shopping"></i>
            </div>

            <h2 class="text-center fw-bold">
                Welcome Back
            </h2>

            <p class="text-center text-muted mb-4">
                Sign in to continue shopping
            </p>

            <form action="/login"
                  method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="Enter your email"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Enter your password"
                           required>

                </div>

                <div class="d-flex justify-content-between mb-4">

                    <div class="form-check">

                        <input class="form-check-input"
                               type="checkbox"
                               id="remember">

                        <label class="form-check-label"
                               for="remember">

                            Remember Me

                        </label>

                    </div>

                    <a href="#"
                       class="text-decoration-none">

                        Forgot Password?

                    </a>

                </div>

                <button type="submit"
                        class="btn btn-login w-100">

                    Login

                </button>

            </form>

            <div class="text-center mt-4">

                <p>
                    New User?
                    <a href="/register"
                       class="text-decoration-none fw-bold">

                        Create Account

                    </a>
                </p>

            </div>

            <hr>

            <div class="row">

                <div class="col-6">

                    <button class="btn btn-outline-secondary w-100 social-btn">

                        <i class="fab fa-google"></i>

                        Google

                    </button>

                </div>

                <div class="col-6">

                    <button class="btn btn-outline-secondary w-100 social-btn">

                        <i class="fab fa-facebook-f"></i>

                        Facebook

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {

    navigator.serviceWorker
        .register('/sw.js')
        .then(() => {
            console.log('Service Worker Registered');
        });

}
</script>

</body>
</html>
</body>

</html>
