<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Cart - Style Cart</title>

<link rel="icon" type="image/png" href="/images/Logo.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

    body{
        background:#f8f9fa;
    }

    .navbar{
        background:#111827;
    }

    .cart-card{
        border:none;
        border-radius:20px;
        overflow:hidden;
        transition:.3s;
    }

    .cart-card:hover{
        transform:translateY(-5px);
    }

    .product-img{
        height:220px;
        object-fit:cover;
    }

    .summary-card{
        background:white;
        border-radius:20px;
        padding:25px;
        box-shadow:0 0 15px rgba(0,0,0,0.08);
        position:sticky;
        top:20px;
    }

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

    <a class="navbar-brand fw-bold"
       href="/home">
        Style Cart
    </a>

    <div class="ms-auto">

        <a href="/products"
           class="btn btn-outline-light me-2">
            Products
        </a>

        <a href="/home"
           class="btn btn-warning">
            Home
        </a>

    </div>

</div>

</nav>

<div class="container mt-5">

<h1 class="text-center fw-bold mb-5">
    Shopping Cart
</h1>

<div class="row">

    <div class="col-lg-8">

        <div class="row">

            <div class="col-md-6 mb-4"
                 th:each="item : ${cartItems}">

                <div class="card shadow cart-card">

                    <img th:src="${item.imageUrl}"
                         class="card-img-top product-img">

                    <div class="card-body text-center">

                        <h5 th:text="${item.productName}">
                            Product
                        </h5>

                        <h4 class="text-success">

    ₹<span th:text="${item.price}"></span>

</h4>

<div class="d-flex justify-content-center align-items-center mt-3">

    <a th:href="@{/decrease-quantity/{id}(id=${item.id})}"
       class="btn btn-danger">
        -
    </a>

    <span class="mx-3 fw-bold fs-5"
          th:text="${item.quantity}">
        1
    </span>

    <a th:href="@{/increase-quantity/{id}(id=${item.id})}"
       class="btn btn-success">
        +
    </a>

</div>

<h5 class="mt-3">

    Total:
    ₹<span th:text="${item.price * item.quantity}"></span>

</h5>

<a th:href="@{/remove-cart/{id}(id=${item.id})}"
   class="btn btn-danger mt-2">
    Remove
</a>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="col-lg-4">

        <div class="summary-card">

            <h3 class="mb-4">
                Order Summary
            </h3>

            <div class="d-flex justify-content-between">

                <span>Subtotal</span>

                <span>
                    ₹<span th:text="${total}"></span>
                </span>

            </div>

            <hr>

            <div class="d-flex justify-content-between">

                <span>Shipping</span>

                <span>₹100</span>

            </div>

            <hr>

            <div class="d-flex justify-content-between">

                <span>GST</span>

                <span>
                    ₹<span th:text="${total * 0.05}"></span>
                </span>

            </div>

            <hr>

            <div class="d-flex justify-content-between fw-bold">

                <span>Total</span>

                <span>
                    ₹<span th:text="${total + 100 + (total * 0.05)}"></span>
                </span>

            </div>

            <a href="/checkout"
               class="btn btn-dark w-100 mt-4">
                Proceed To Checkout
            </a>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {

    navigator.serviceWorker
        .register('/sw.js')
        .then(() => {
            console.log('Service Worker Registered');
        });

}
</script>

</body>
</html>
</body>

</html>
