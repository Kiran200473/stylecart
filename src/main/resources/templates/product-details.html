<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Product Details - Style Cart</title>

    <link rel="icon" type="image/png" href="/images/Logo.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f8f9fa;
        }

        .navbar{
            background:#111827;
        }

        .product-image{
            width:100%;
            height:500px;
            object-fit:cover;
            border-radius:20px;
        }

        .product-box{
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.08);
        }

        .rating{
            color:#ffc107;
            font-size:18px;
        }

        .discount{
            background:red;
            color:white;
            padding:8px 15px;
            border-radius:20px;
            font-size:14px;
        }

        .old-price{
            text-decoration:line-through;
            color:gray;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/home">
            Style Cart
        </a>

        <div class="ms-auto">

            <a href="/products"
               class="btn btn-outline-light me-2">
                Products
            </a>

            <a href="/cart"
               class="btn btn-warning">
                Cart
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row g-5">

        <div class="col-lg-6">

            <img th:src="${product.imageUrl}"
                 class="product-image shadow">

        </div>

        <div class="col-lg-6">

            <div class="product-box">

                <span class="badge bg-dark mb-3"
                      th:text="${product.category}">
                </span>

                <h1 class="fw-bold"
                    th:text="${product.name}">
                </h1>

                <div class="rating mt-3">

                    ⭐⭐⭐⭐⭐

                    <span class="text-dark"
                          th:text="${product.rating}">
                    </span>

                </div>

                <div class="mt-3">

                    <span class="discount"
                          th:text="${product.discount} + '% OFF'">
                    </span>

                </div>

                <div class="mt-4">

                    <h2 class="text-success">

                        ₹<span th:text="${product.price}"></span>

                    </h2>

                    <p class="old-price">

                        ₹<span th:text="${product.price + 1000}"></span>

                    </p>

                </div>

                <hr>

                <h5>Description</h5>

                <p class="text-secondary"
                   th:text="${product.description}">
                </p>

                <div class="d-grid gap-2 mt-4">

                    <a th:href="@{'/add-cart/' + ${product.id}}"
                       class="btn btn-dark btn-lg">
                        Add To Cart
                    </a>

                    <a href="/products"
                       class="btn btn-outline-secondary">
                        Back To Products
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {

    navigator.serviceWorker
        .register('/sw.js')
        .then(() => {
            console.log('Service Worker Registered');
        });

}
</script>

</body>
</html>
</body>
</html>
