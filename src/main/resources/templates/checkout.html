<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Checkout - Style Cart</title>

<link rel="icon" type="image/png" href="/images/Logo.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

    body{
        background:#f8f9fa;
    }

    .navbar{
        background:#111827;
    }

    .checkout-card{
        background:white;
        border-radius:20px;
        padding:30px;
        box-shadow:0 0 15px rgba(0,0,0,0.08);
    }

    .summary-card{
        background:white;
        border-radius:20px;
        padding:25px;
        box-shadow:0 0 15px rgba(0,0,0,0.08);
    }

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

    <a class="navbar-brand fw-bold"
       href="/home">
        Style Cart
    </a>

    <div class="ms-auto">

        <a href="/cart"
           class="btn btn-outline-light me-2">
            Cart
        </a>

        <a href="/products"
           class="btn btn-warning">
            Products
        </a>

    </div>

</div>

</nav>

<div class="container mt-5">

<h1 class="text-center fw-bold mb-5">
    Checkout
</h1>

<div class="row">

    <div class="col-lg-8">

        <div class="checkout-card">

            <h3 class="mb-4">
                Shipping Information
            </h3>

            <form action="/success" method="get">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input type="text"
                               class="form-control"
                               placeholder="Enter full name"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               class="form-control"
                               placeholder="Enter email"
                               required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Phone Number
                    </label>

                    <input type="tel"
                           class="form-control"
                           placeholder="Enter phone number"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Address
                    </label>

                    <textarea class="form-control"
                              rows="4"
                              placeholder="Enter delivery address"
                              required></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Payment Method
                    </label>

                    <select class="form-select" required>

                        <option>
                            Cash On Delivery
                        </option>

                        <option>
                            UPI Payment
                        </option>

                        <option>
                            Credit Card
                        </option>

                        <option>
                            Debit Card
                        </option>

                    </select>

                </div>

                <button type="submit"
                    class="btn btn-dark w-100 mt-4">
                Place Order
                </button>

            </form>

        </div>

    </div>

    <div class="col-lg-4">

        <div class="summary-card">

            <h3>
                Order Summary
            </h3>

            <hr>

            <div class="d-flex justify-content-between">

                <span>Subtotal</span>

                <span>
                    ₹<span th:text="${total}"></span>
                </span>

            </div>

            <hr>

            <div class="d-flex justify-content-between">

                <span>Shipping</span>

                <span>₹100</span>

            </div>

            <hr>

            <div class="d-flex justify-content-between">

                <span>GST</span>

                <span>
                    ₹<span th:text="${total * 0.05}"></span>
                </span>

            </div>

            <hr>

            <div class="d-flex justify-content-between fw-bold">

                <span>Total</span>

                <span>
                    ₹<span th:text="${total + 100 + (total * 0.05)}"></span>
                </span>

            </div>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {

    navigator.serviceWorker
        .register('/sw.js')
        .then(() => {
            console.log('Service Worker Registered');
        });

}
</script>

</body>
</html>
</body>

</html>
