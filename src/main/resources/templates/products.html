<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Products - Style Cart</title>

<link rel="icon" type="image/png" href="/images/Logo.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet">

<style>

    body{
        background:#f8f9fa;
    }

    .navbar{
        background:#111827;
    }

    .product-card{
        border:none;
        border-radius:18px;
        overflow:hidden;
        transition:.3s;
        position:relative;
    }

    .product-card:hover{
        transform:translateY(-10px);
    }

    .product-img{
        height:260px;
        object-fit:cover;
    }

    .discount-badge{
        position:absolute;
        top:10px;
        right:10px;
        background:red;
        color:white;
        padding:6px 10px;
        border-radius:20px;
        font-size:12px;
        font-weight:bold;
    }

    .rating{
        color:#ffc107;
    }

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

    <a class="navbar-brand fw-bold"
       href="/home">
        Style Cart
    </a>

    <div class="ms-auto">

    <a href="/home"
       class="btn btn-outline-light me-2">
        Home
    </a>

    <a href="/wishlist"
       class="btn btn-outline-info me-2">
        Wishlist
    </a>

    <a href="/cart"
       class="btn btn-warning me-2">
        Cart
    </a>

    <a href="/order-history"
       class="btn btn-success">
        Orders
    </a>

</div>

    </div>

</nav>

<div class="container mt-5">

<h1 class="text-center fw-bold mb-2">
    Explore Products
</h1>

<p class="text-center text-muted mb-5">
    Discover trending fashion and electronics
</p>

<div class="row justify-content-center mb-5">

    <div class="col-lg-6">

        <form action="/products" method="get">

            <div class="input-group shadow">

                <input type="text"
                       name="keyword"
                       class="form-control"
                       placeholder="Search products..."
                       th:value="${keyword}">

                <button class="btn btn-dark"
                        type="submit">

                    <i class="fa-solid fa-magnifying-glass"></i>
                    Search

                </button>

            </div>

        </form>

    </div>

</div>
<div class="text-center mb-5">

    <a href="/products"
       class="btn btn-outline-dark m-1">
        All
    </a>

    <a href="/products?category=Fashion"
       class="btn btn-outline-primary m-1">
        Fashion
    </a>

    <a href="/products?category=Shoes"
       class="btn btn-outline-success m-1">
        Shoes
    </a>

    <a href="/products?category=Watches"
       class="btn btn-outline-warning m-1">
        Watches
    </a>

    <a href="/products?category=Electronics"
       class="btn btn-outline-danger m-1">
        Electronics
    </a>

    <a href="/products?category=Beauty"
       class="btn btn-outline-info m-1">
        Beauty
    </a>

    <a href="/products?category=Home Decor"
       class="btn btn-outline-secondary m-1">
        Home Decor
    </a>

    <a href="/products?category=Women Fashion"
      class="btn btn-outline-danger m-1">
        Women Fashion
    </a>

</div>
<div class="text-center mb-4">

    <h6 class="text-secondary">

        Products Found:
        <span th:text="${#lists.size(products)}"></span>

    </h6>

</div>

<div class="row">

    <div class="col-lg-3 col-md-4 col-sm-6 mb-4"
         th:each="product : ${products}">

        <div class="card shadow product-card">

            <span class="discount-badge"
                  th:text="${product.discount} + '% OFF'">
            </span>

            <img th:src="${product.imageUrl}"
                 class="card-img-top product-img">

            <div class="card-body">

                <small class="text-muted"
                       th:text="${product.category}">
                </small>

                <h5 class="mt-2"
                    th:text="${product.name}">
                </h5>

                <div class="rating mb-2">

                    ⭐⭐⭐⭐⭐

                    <span class="text-dark"
                          th:text="${product.rating}">
                    </span>

                </div>

                <h5 class="text-success">

                    ₹<span th:text="${product.price}"></span>

                </h5>

               <div class="d-grid gap-2 mt-3">

    <a th:href="@{'/product/' + ${product.id}}"
       class="btn btn-outline-dark">
        View Details
    </a>

    <a th:href="@{'/add-wishlist/' + ${product.id}}"
       class="btn btn-outline-danger">
        ❤ Wishlist
    </a>

    <a th:href="@{'/add-cart/' + ${product.id}}"
       class="btn btn-dark">
        Add To Cart
    </a>

            </div>

            </div>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {

    navigator.serviceWorker
        .register('/sw.js')
        .then(() => {
            console.log('Service Worker Registered');
        });

}
</script>

</body>
</html>
</body>

</html>
