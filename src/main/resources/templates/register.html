<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Register - Style Cart</title>

<link rel="icon" type="image/png" href="/images/Logo.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        min-height:100vh;
        background:#f8f9fa;
    }

    .register-container{
        min-height:100vh;
    }

    .left-side{
        background:
        linear-gradient(rgba(0,0,0,.45),
        rgba(0,0,0,.45)),
        url('https://images.unsplash.com/photo-1483985988355-763728e1935b');
        background-size:cover;
        background-position:center;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:50px;
    }

    .brand-content h1{
        font-size:60px;
        font-weight:bold;
    }

    .brand-content p{
        font-size:20px;
        margin-top:15px;
    }

    .right-side{
        display:flex;
        justify-content:center;
        align-items:center;
        padding:40px;
        background:white;
    }

    .register-card{
        width:100%;
        max-width:500px;
    }

    .logo-circle{
        width:80px;
        height:80px;
        border-radius:50%;
        background:#111827;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:35px;
        margin:auto;
    }

    .form-control{
        height:50px;
        border-radius:12px;
    }

    .btn-register{
        height:50px;
        border-radius:12px;
        background:#111827;
        color:white;
        font-weight:600;
        border:none;
    }

    .btn-register:hover{
        background:#000;
        color:white;
    }

    @media(max-width:768px){

        .left-side{
            display:none;
        }

    }

</style>

</head>

<body>

<div class="container-fluid">

<div class="row register-container">

    <div class="col-md-6 left-side">

        <div class="brand-content text-center">

            <h1>STYLE CART</h1>

            <p>
                Create your account and start shopping
            </p>

            <h4 class="mt-4">
                Fashion • Electronics • Lifestyle
            </h4>

        </div>

    </div>

    <div class="col-md-6 right-side">

        <div class="register-card">

            <div class="logo-circle mb-4">
                <i class="fas fa-user-plus"></i>
            </div>

            <h2 class="text-center fw-bold">
                Create Account
            </h2>

            <p class="text-center text-muted mb-4">
                Join Style Cart today
            </p>

            <form action="/register"
                  method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           placeholder="Enter your full name"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="Enter your email"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Create password"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Confirm Password
                    </label>

                    <input type="password"
                           class="form-control"
                           placeholder="Confirm password"
                           required>

                </div>

                <div class="form-check mb-4">

                    <input class="form-check-input"
                           type="checkbox"
                           required
                           id="terms">

                    <label class="form-check-label"
                           for="terms">

                        I agree to the Terms & Conditions

                    </label>

                </div>

                <button type="submit"
                        class="btn btn-register w-100">

                    Create Account

                </button>

            </form>

            <div class="text-center mt-4">

                <p>

                    Already have an account?

                    <a href="/"
                       class="text-decoration-none fw-bold">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {

    navigator.serviceWorker
        .register('/sw.js')
        .then(() => {
            console.log('Service Worker Registered');
        });

}
</script>

</body>
</html>
</body>

</html>
