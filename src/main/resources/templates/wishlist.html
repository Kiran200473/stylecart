<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wishlist - Style Cart</title>

<link rel="icon" type="image/png" href="/images/Logo.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f8f9fa;
}

.navbar{
    background:#111827;
}

.wishlist-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    transition:.3s;
}

.wishlist-card:hover{
    transform:translateY(-5px);
}

.product-image{
    height:250px;
    object-fit:cover;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

    <a class="navbar-brand fw-bold"
       href="/home">
        Style Cart
    </a>

    <div class="ms-auto">

        <a href="/products"
           class="btn btn-outline-light me-2">
            Products
        </a>

        <a href="/cart"
           class="btn btn-warning">
            Cart
        </a>

    </div>

</div>

</nav>

<div class="container mt-5">

<h1 class="text-center fw-bold mb-5">
    My Wishlist
</h1>

<div class="row">

<div class="col-lg-4 mb-4"
     th:each="item : ${wishlistItems}">

    <div class="card shadow wishlist-card">

        <img th:src="${item.imageUrl}"
             class="card-img-top product-image">

        <div class="card-body">

            <h5 th:text="${item.productName}"></h5>

            <h4 class="text-success">

                ₹<span th:text="${item.price}"></span>

            </h4>

            <div class="d-grid gap-2 mt-3">

                <a th:href="@{'/wishlist-to-cart/' + ${item.id}}"
                   class="btn btn-dark">
                    Move To Cart
                </a>

                <a th:href="@{'/remove-wishlist/' + ${item.id}}"
                   class="btn btn-outline-danger">
                    Remove
                </a>

            </div>

        </div>

    </div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {

    navigator.serviceWorker
        .register('/sw.js')
        .then(() => {
            console.log('Service Worker Registered');
        });

}
</script>

</body>
</html>
</body>

</html>
